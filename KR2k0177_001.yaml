body:
  text: 湘中記羅含水經注引二事湘水之出于陽朔則觴為之舟至洞庭日月若出入于其中也湘水注屈潭之左有玉笥山道士遺言此福地也湘水注後漢書郡國志昭注引一事有營水有桃水有雍水有祁水有宜水有舂水有蒸水有表水有耒水有淥水有漣水有瀏水有溈水有汨水有資水皆注湘零陵郡注初學記引三事衡山遙望如陳雲沿湘千里九向九背卷五衡山九疑皆有舜廟太守至官常遣戶曹致敬候祀則如有絃歌之聲卷五衡山有懸泉滴瀝嵓間聲泠泠如絃音有鶴回翔其上如舞卷五太平御覽引二事石燕在零雲縣雷風則群飛翩翩然其土人來採有乾者今合藥或用卷四十九石燕在泉陵縣雷雨則群飛然其土人稀有見者卷一百七十一
